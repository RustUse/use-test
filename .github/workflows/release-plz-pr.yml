name: Release PR

on:
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    release-pr:
        name: release-plz PR
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run release-plz
              uses: release-plz/action@v0.5
              with:
                  command: release-pr
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
