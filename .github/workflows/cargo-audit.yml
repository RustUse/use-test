name: Cargo Audit

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    audit:
        name: cargo audit
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Install cargo-audit
              uses: taiki-e/install-action@v2
              with:
                  tool: cargo-audit

            - name: Run cargo audit
              run: cargo audit
